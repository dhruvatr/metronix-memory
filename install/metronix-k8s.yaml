---
apiVersion: v1
kind: Namespace
metadata:
  name: metronix
---
apiVersion: v1
kind: Secret
metadata:
  name: metronix-secret
  namespace: metronix
type: Opaque
stringData:
  postgres-password: "metronix_dev"
  openai-api-key: "metronix-test-key"  
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metronix-config
  namespace: metronix
data:
  postgres-db: "metronix"
  postgres-user: "metronix"
  redis-db: "0"
  ollama-embed-model: "nomic-embed-text"
  ollama-chat-model: "llama3.1:8b"
  metronix-freshness-enabled: "true"
  hf-home: "/app/data/hf_cache"
  webui-auth: "false"
  openai-api-base-url: "http://metronix-core:8000/"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: file-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: metronix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ------------------ Deployments & Services ------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metronix-secret
                  key: postgres-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "metronix"]
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "metronix"]
            initialDelaySeconds: 0
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "metronix"]
            initialDelaySeconds: 0
            periodSeconds: 5
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: metronix
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      #  NodePort
      # nodePort: 30033
  # type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.16.1
          ports:
            - containerPort: 6333
            - containerPort: 6334
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          startupProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            periodSeconds: 5
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-data
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: metronix
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          env:
            - name: NEO4J_AUTH
              value: "none"
          ports:
            - containerPort: 7474
            - containerPort: 7687
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          startupProbe:
            exec:
              command: ["cypher-shell", "RETURN 1"]
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["cypher-shell", "RETURN 1"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["cypher-shell", "RETURN 1"]
            periodSeconds: 10
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-data
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: metronix
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          startupProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: metronix
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command:
            - /bin/bash
            - -c
            - |
              ollama serve &
              for i in $(seq 1 30); do
                sleep 1
                ollama list >/dev/null 2>&1 && break
              done
              ollama pull $OLLAMA_EMBED_MODEL
              [ -n "$OLLAMA_CHAT_MODEL" ] && ollama pull $OLLAMA_CHAT_MODEL
              wait
          env:
            - name: OLLAMA_EMBED_MODEL
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: ollama-embed-model
            - name: OLLAMA_CHAT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: ollama-chat-model
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          startupProbe:
            exec:
              command:
                - bash
                - -c
                - "exec 3<>/dev/tcp/localhost/11434 && exec 3>&-"
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "exec 3<>/dev/tcp/localhost/11434 && exec 3>&-"
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "exec 3<>/dev/tcp/localhost/11434 && exec 3>&-"
            periodSeconds: 10
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: metronix
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splade
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splade
  template:
    metadata:
      labels:
        app: splade
    spec:
      containers:
        - name: splade
          image: ghcr.io/mtrnix/metronixcore:splade-develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: splade
  namespace: metronix
spec:
  selector:
    app: splade
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-proxy
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-proxy
  template:
    metadata:
      labels:
        app: embedding-proxy
    spec:
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z ollama 11434; do echo waiting for ollama; sleep 2; done"
      containers:
        - name: embedding-proxy
          image: ghcr.io/mtrnix/metronixcore:embedding-proxy-develop
          imagePullPolicy: Always
          env:
            - name: OLLAMA_HOST
              value: "ollama"
            - name: OLLAMA_PORT
              value: "11434"
            - name: OLLAMA_MODEL
              value: "nomic-embed-text"   # ConfigMap
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-proxy
  namespace: metronix
spec:
  selector:
    app: embedding-proxy
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metronix-core
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metronix-core
  template:
    metadata:
      labels:
        app: metronix-core
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for services..."
              until nc -z postgres 5432; do sleep 2; done
              until nc -z qdrant 6333; do sleep 2; done
              until nc -z neo4j 7687; do sleep 2; done
              until nc -z ollama 11434; do sleep 2; done
              until nc -z splade 8080; do sleep 2; done
              echo "All dependencies ready."
      containers:
        - name: metronix-core
          image: ghcr.io/mtrnix/metronixcore:metronixcore-develop
          imagePullPolicy: Always
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metronix-secret
                  key: postgres-password
            - name: QDRANT_HOST
              value: "qdrant"
            - name: NEO4J_HOST
              value: "neo4j"
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
            - name: BENCHMARKER_EMBEDDING_PROXY_URL
              value: "http://embedding-proxy:8001"
            - name: REDIS_HOST
              value: "redis"
            - name: SPLADE_SERVICE_URL
              value: "http://splade:8080"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: file-data
              mountPath: /app/data
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
      volumes:
        - name: file-data
          persistentVolumeClaim:
            claimName: file-data
---
apiVersion: v1
kind: Service
metadata:
  name: metronix-core
  namespace: metronix
spec:
  selector:
    app: metronix-core
  ports:
    - port: 8000
      targetPort: 8000
      # nodePort: 30080
  # type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshness-worker
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshness-worker
  template:
    metadata:
      labels:
        app: freshness-worker
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do sleep 2; done
              until nc -z qdrant 6333; do sleep 2; done
              until nc -z neo4j 7687; do sleep 2; done
              until nc -z redis 6379; do sleep 2; done
      containers:
        - name: freshness-worker
          image: ghcr.io/mtrnix/metronixcore:metronixcore-develop
          command: ["python", "-m", "metronix.memory.freshness"]
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: QDRANT_HOST
              value: "qdrant"
            - name: NEO4J_HOST
              value: "neo4j"
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: redis-db
            - name: METRONIX_FRESHNESS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: metronix-freshness-enabled
            - name: HF_HOME
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: hf-home
          volumeMounts:
            - name: file-data
              mountPath: /app/data
      volumes:
        - name: file-data
          persistentVolumeClaim:
            claimName: file-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metronix-ui
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metronix-ui
  template:
    metadata:
      labels:
        app: metronix-ui
    spec:
      initContainers:
        - name: wait-for-core
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z metronix-core 8000; do sleep 2; done"]
      containers:
        - name: metronix-ui
          image: ghcr.io/mtrnix/metronixui:ui-develop
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: metronix-ui
  namespace: metronix
spec:
  selector:
    app: metronix-ui
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000   #  <NodeIP>:30000
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      initContainers:
        - name: wait-for-core
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z metronix-core 8000; do sleep 2; done"]
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          env:
            - name: WEBUI_AUTH
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: webui-auth
            - name: OPENAI_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: metronix-config
                  key: openai-api-base-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: metronix-secret
                  key: openai-api-key
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
      volumes:
        - name: openwebui-data
          persistentVolumeClaim:
            claimName: openwebui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: metronix
spec:
  selector:
    app: open-webui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800   # <NodeIP>:30800
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metronix-ui-cc
  namespace: metronix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metronix-ui-cc
  template:
    metadata:
      labels:
        app: metronix-ui-cc
    spec:
      initContainers:
        - name: wait-for-core
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z metronix-core 8000; do sleep 2; done"]
      containers:
        - name: metronix-ui-cc
          image: ghcr.io/mtrnix/metronixui:ui-cc-develop
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: metronix-ui-cc
  namespace: metronix
spec:
  selector:
    app: metronix-ui-cc
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30010
  type: NodePort
