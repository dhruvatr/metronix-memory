    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: coda123
        password: dckr_pat_-74tgub07sIMhJaat2wVu5J7Vys    

    - name: Copy env file to server
      run: |
        scp -o StrictHostKeyChecking=no \
            -i /tmp/ssh_key \
            .github/workflows/env \
            username@metatroncore.ximi.group:/tmp/env
        
        ssh -o StrictHostKeyChecking=no \
            -i /tmp/ssh_key \
            username@metatroncore.ximi.group \
            "sudo mv /tmp/env /usr/local/bin/env && \
             sudo chown root:root /usr/local/bin/env && \
             sudo chmod 644 /usr/local/bin/env && \
             echo '✅ Env file deployed to /usr/local/bin/env'"    
        
    - name: Test SSH connection
      run: |
        ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -i /tmp/ssh_key \
            github-actions@metatron-benchmarker.ximi.group \
            "echo '✅ SSH test successful'; whoami; pwd"
            
    - name: Test sudo access
      run: |
        ssh -o StrictHostKeyChecking=no \
            -i /tmp/ssh_key \
            username@metatroncore.ximi.group \
            "sudo whoami && echo '✅ Sudo works' || echo '❌ Sudo failed'"
            
    - name: Deploy application
      run: |
        ssh -o StrictHostKeyChecking=no \
            -i /tmp/ssh_key \
            github-actions@metatron-benchmarker.ximi.group \
            "/usr/local/bin/deploy-app"
            
    - name: Cleanup
      run: |
        rm -f /tmp/ssh_key
        echo "Test completed"
