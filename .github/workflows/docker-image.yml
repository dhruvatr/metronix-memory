name: Build CORE (simple)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Quick cleanup
      run: |
        sudo docker system prune -f
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
        df -h
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Determine branch name
      id: branch
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        echo "tag=$BRANCH_NAME" >> $GITHUB_OUTPUT
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-${{ steps.branch.outputs.tag }}
        cache-from: |
          type=registry,ref=${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-cache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-cache,mode=max
        provenance: false
        sbom: false
